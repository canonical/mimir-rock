project: mimir-rock

backends:
  craft:
    type: craft
    systems:
      - ubuntu-24.04:
      #- ubuntu-22.04:

suites:
  spread/general/:
    summary: General integration tests

    prepare: |
      PROJECT_NAME="mimir-rock"
      # Install docker
      sudo snap install docker

      # For 'rockcraft.skopeo'
      sudo snap install --classic rockcraft

      # Wait for docker daemon to come online
      sudo apt install --yes retry
      retry --times=10 --delay 2 -- docker run hello-world
      sudo apt remove --yes retry

      # Load the rock into docker
      sudo rockcraft.skopeo --insecure-policy copy "oci-archive:$CRAFT_ARTIFACT" docker-daemon:$PROJECT_NAME:latest
      
      # Run the rock
      docker run -d --rm --name $PROJECT_NAME

    restore: |
      PROJECT_NAME="mimir-rock"
      docker stop $PROJECT_NAME
      docker image rm --force $PROJECT_NAME:latest

exclude:
  - .git

kill-timeout: 1h
